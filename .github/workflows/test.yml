name: tests
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Godot 4.7
        run: |
          curl -sL -o godot.zip https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
          unzip -q godot.zip
          sudo mv Godot_v4.7-stable_linux.x86_64 /usr/local/bin/godot
          godot --version
      - name: Run tests
        run: ./scripts/test.sh
