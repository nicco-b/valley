name: ci

# The safety net for a FRESH checkout — which is exactly CI's state and the
# hardest one: the blessed-world tile (data/terrain/tiles/baked_*.exr), the
# region records, and the synth asset drop (assets/models, assets/paintings)
# are all gitignored and regenerated locally, so a clean clone has NO world
# content. This workflow runs only the gates that pass honestly WITHOUT that
# content; the asset-dependent gates stay named and out (see the note below).
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  content-free-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # No `lfs: true`: the binaries are untracked-on-disk (the LFS
        # decision is still pending, see .gitignore), never LFS objects.

      - name: Install Godot 4.7
        run: |
          set -euo pipefail
          curl -sL -o godot.zip \
            https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
          unzip -q godot.zip
          sudo mv Godot_v4.7-stable_linux.x86_64 /usr/local/bin/godot
          godot --version

      # Parse gate: import in FULL project context (autoloads registered) so
      # every .gd compiles. `--import` returns 0 even on a parse error, so
      # the gate is the error text, not the exit code. (A per-file
      # --check-only would false-positive on every autoload reference —
      # Terrain, WorldState, GameClock… — which only resolve in project
      # context. Import is the honest whole-project parse.)
      - name: GDScript parse (project import)
        run: |
          set -euo pipefail
          OUT=$(godot --headless --import 2>&1) || true
          echo "$OUT"
          if echo "$OUT" | grep -E "SCRIPT ERROR|Parse Error|Compile Error"; then
            echo "PARSE FAIL: a script failed to compile (see above)"
            exit 1
          fi
          echo "parse clean"

      # The framework fence (PLAN_FRAMEWORK FW5): a pure static text scan
      # over every file framework.json lists — no assets, no scene, no world
      # content. Self-asserting: it quit(1)s on a real violation, so the exit
      # code is the gate.
      - name: Framework manifest lint
        run: godot --headless -s tests/framework_lint.gd

      # The quest harness (DESIGN_QUESTS §10): the quest linter + every
      # tests/quests/*.test.json driven through the REAL Story machinery,
      # headless. Content-free (quests + threads are committed data). Same
      # backstop as scripts/test.sh: --quit-after always exits 0, so success
      # is the PASS line and a SCRIPT ERROR is a failure.
      - name: Quest harness + lint
        run: |
          set -euo pipefail
          OUT=$(godot --headless --quit-after 4000 res://tests/quest_harness.tscn 2>&1)
          echo "$OUT" | grep -E "QUEST-HARNESS|LINT|FAIL|SCRIPT ERROR" || true
          echo "$OUT" | grep -q "SCRIPT ERROR" && { echo "quest harness: script error"; exit 1; }
          echo "$OUT" | grep -q "QUEST-HARNESS PASS" || { echo "quest harness: no PASS line"; exit 1; }
          echo "quest harness green"

      # ---------------------------------------------------------------------
      # OUT of CI v1 — verified to need the gitignored world content, gated
      # here by name so the skip is honest, not silent:
      #
      #   * scripts/test.sh unit runner (tests/run_tests.gd): the spawn-on-
      #     land invariant enforces height(0,5) > sea_level ONLY when no tile
      #     is cached; the committed procedural world floods spawn without a
      #     blessed tile (sea_level 12m vs ground 0.1m), so it FAILS in a
      #     clean clone instead of skipping.
      #   * scene tests (tests/scene_tests.tscn): the pen-carve probes write
      #     a pen file against a loaded world tile — fail without one.
      #   * title/world smoke + soak: need a world scene with real content.
      #   * the Metal RenderingDevice compute path (sand/water kernels): only
      #     the soak/smoke exercise it, so it rides in with them, on a
      #     macos-14 job, once a committed minimal world tile lands.
      #
      # The unlock for all of these is a small committed world fixture (a
      # blessed tile + region record) or a job step that bakes one. Tracked
      # as CI v2.
