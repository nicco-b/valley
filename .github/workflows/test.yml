name: tests
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Install Godot 4.7
        run: |
          curl -sL -o godot.zip https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
          unzip -q godot.zip
          sudo mv Godot_v4.7-stable_linux.x86_64 /usr/local/bin/godot
          godot --version
      - name: Run tests
        run: ./scripts/test.sh

  # Same suite on the shipping platform: Apple Silicon + Metal. The
  # riskiest code in the repo is RenderingDevice compute (sand/water
  # kernels) — Linux CI never exercises the Metal path; this does.
  test-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Install Godot 4.7
        run: |
          curl -sL -o godot.zip https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_macos.universal.zip
          unzip -q godot.zip
          xattr -cr Godot.app
          sudo mkdir -p /usr/local/bin
          printf '#!/bin/sh\nexec "%s/Godot.app/Contents/MacOS/Godot" "$@"\n' "$PWD" | sudo tee /usr/local/bin/godot >/dev/null
          sudo chmod +x /usr/local/bin/godot
          godot --version
      - name: Run tests
        run: ./scripts/test.sh
