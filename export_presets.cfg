; The framework's macOS ship preset (PLAN_SHIP §3), copied into every
; scaffolded game by the New Game scaffold (manifest law — this file joins
; framework.json). ONE preset, "macOS · ship":
;   - custom_features="strata_no_dev": the dev-gate kill switch (PLAN_SHIP
;     §2). DevMode.active() returns false in the shipped binary, so the
;     link, the Toolkit, hot reload and every debug key are provably dead —
;     the release-flavor boot probe asserts it.
;   - explicit exclude filters, NO usage inference (the RPG Maker lesson):
;     authoring residue is dropped by name; everything else in res:// ships.
;   - custom_template/* is EMPTY here (portable): `strata-cli ship` points
;     it at the machine's official 4.7 macos.zip in the staging copy, so the
;     committed file carries no machine path.
;   - codesign/codesign=0: Ship ad-hoc signs after export (the make_app.sh
;     precedent), so Godot's own signing stays off.
; Identity (bundle id / version / icon) is stamped per-game at ship time.

[preset.0]

name="macOS · ship"
platform="macOS"
runnable=true
advanced_options=false
dedicated_server=false
custom_features="strata_no_dev"
export_filter="all_resources"
include_filter=""
exclude_filter="worlds/*, *.strata, *.strataproj, *.strata-notes.json, tools/strata/*, tests/*, docs/*, scripts/*, releases/*, dist/*, framework.json, framework.lock.json"
export_path=""
patches=PackedStringArray()
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false

[preset.0.options]

export/distribution_type=0
binary_format/architecture="universal"
custom_template/debug=""
custom_template/release=""
debug/export_console_wrapper=1
application/icon=""
application/icon_interpolation=4
application/bundle_identifier="com.strata.game"
application/signature=""
application/app_category="Games"
application/short_version=""
application/version=""
application/copyright=""
application/min_macos_version_x86_64="10.13"
application/min_macos_version_arm64="11.00"
application/export_angle=0
display/high_res=true
codesign/codesign=0
notarization/notarization=0
